<app-container [size]="'xl'">
  <div class="home-layout">
    <div class="home-main">
      <!-- Timer Section -->
      <section class="timer-section">
        <app-timer></app-timer>
        <app-intention-input></app-intention-input>
        <app-timer-controls></app-timer-controls>

        <!-- Log de focos concluídos hoje -->
        <app-intention-log></app-intention-log>
      </section>
    </div>

  </div>
</app-container>

<!-- Sidebar de estatísticas: fixed no desktop, fluxo normal no mobile -->
<app-stats-sidebar [stats]="stats()"></app-stats-sidebar>
