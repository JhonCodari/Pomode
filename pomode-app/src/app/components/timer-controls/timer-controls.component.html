<div class="controls-container" role="toolbar">
  <!-- Botão de Start/Pause/Continue -->
  <app-button
    *ngIf="state() === 'idle' || state() === 'paused'"
    [variant]="'primary'"
    (click)="start()"
    class="control-btn"
    [attr.aria-label]="(state() === 'paused' ? 'TIMER.CONTROLS.CONTINUE' : 'TIMER.CONTROLS.START') | translate"
  >
    <app-icon name="play" [size]="'xs'" [ariaHidden]="true"></app-icon>
    <span class="btn-text">{{ (state() === 'paused' ? 'TIMER.CONTROLS.CONTINUE' : 'TIMER.CONTROLS.START') | translate }}</span>
  </app-button>

  <app-button
    *ngIf="state() === 'running'"
    [variant]="'primary'"
    (click)="pause()"
    class="control-btn"
    [attr.aria-label]="'TIMER.CONTROLS.PAUSE' | translate"
  >
    <app-icon name="pause" [size]="'xs'" [ariaHidden]="true"></app-icon>
    <span class="btn-text">{{ 'TIMER.CONTROLS.PAUSE' | translate }}</span>
  </app-button>

  <!-- Botão de Reset -->
  <app-button
    [variant]="'outline'"
    (click)="reset()"
    [disabled]="state() === 'idle'"
    class="control-btn"
    [attr.aria-label]="'TIMER.CONTROLS.RESET' | translate"
  >
    <app-icon name="rotate-ccw" [size]="'xs'" [ariaHidden]="true"></app-icon>
    <span class="btn-text">{{ 'TIMER.CONTROLS.RESET' | translate }}</span>
  </app-button>

  <!-- Botão de Pular -->
  <app-button
    [variant]="'outline'"
    (click)="skip()"
    class="control-btn"
    [attr.aria-label]="'TIMER.CONTROLS.SKIP' | translate"
  >
    <app-icon name="skip-forward" [size]="'xs'" [ariaHidden]="true"></app-icon>
    <span class="btn-text">{{ 'TIMER.CONTROLS.SKIP' | translate }}</span>
  </app-button>
</div>
